services:
  postgres:
    image: postgres:16-alpine
    container_name: crowgest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crowgest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crowgest}
      POSTGRES_DB: ${POSTGRES_DB:-crowgest}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crowgest} -d ${POSTGRES_DB:-crowgest}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      target: dev
    container_name: crowgest-backend
    restart: unless-stopped
    environment:
      ENVIRONMENT: development
      DEBUG: "true"
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-crowgest}:${POSTGRES_PASSWORD:-crowgest}@postgres:5432/${POSTGRES_DB:-crowgest}
      AUTH_DISABLED: "${AUTH_DISABLED:-true}"
      FIREBASE_PROJECT_ID: "${FIREBASE_PROJECT_ID:-}"
      FIREBASE_CREDENTIALS_JSON: "${FIREBASE_CREDENTIALS_JSON:-}"
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: crowgest-pgadmin
    restart: unless-stopped
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@crowgest.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
